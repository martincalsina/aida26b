services:
  # PostgreSQL Database Service
  database:
    image: postgres:18-alpine
    container_name: aida26_database
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_SUPERPASS:-CambiaEsta!}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./database/bootstrap.sql:/docker-entrypoint-initdb.d/01-bootstrap.sql:ro
    networks:
      - aida26_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Combined Backend + Frontend Service
  app:
    build:
      context: .
      dockerfile: Dockerfile.combined
    container_name: aida26_app
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3000}
      DB_HOST: ${DB_HOST:-database}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-faculty_management}
      DB_USER: aida26_user
      DB_PASSWORD: ${DB_PASSWORD:-CambiaEsta!}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-yourpassword}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
    ports:
      - "3000:3000"
    depends_on:
      database:
        condition: service_healthy
    networks:
      - aida26_network
    volumes:
      - ./backend/src:/app/backend/src
      - ./backend/package.json:/app/backend/package.json
      - ./backend/tsconfig.json:/app/backend/tsconfig.json
      - ./frontend/src:/app/frontend/src
      - ./frontend/package.json:/app/frontend/package.json
      - ./frontend/tsconfig.json:/app/frontend/tsconfig.json
      - ./frontend/index.html:/app/frontend/index.html
    command: sh -c "DB_USER=aida26_owner DB_PASSWORD=CambiaEsta! npm run migrate && npm run seed-admin && npm run dev"

volumes:
  postgres_data:

networks:
  aida26_network:
    driver: bridge
