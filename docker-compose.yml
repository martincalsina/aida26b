services:
  # PostgreSQL Database Service
  database:
    image: postgres:18-alpine
    container_name: aida26_database
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_SUPERPASS:-CambiaEsta!}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./database/bootstrap.sql:/docker-entrypoint-initdb.d/01-bootstrap.sql:ro
    networks:
      - aida26_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Service
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: aida26_backend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3000}
      DB_HOST: ${DB_HOST:-database}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-faculty_management}
      DB_USER: aida26_user
      DB_PASSWORD: ${DB_PASSWORD:-CambiaEsta!}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-yourpassword}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
    ports:
      - "3000:3000"
    depends_on:
      database:
        condition: service_healthy
    networks:
      - aida26_network
    volumes:
      - ./backend/src:/app/backend/src
      - ./backend/package.json:/app/backend/package.json
      - ./backend/tsconfig.json:/app/backend/tsconfig.json
      - ./database/migrations:/app/database/migrations
      - ./tsconfig.base.json:/app/tsconfig.base.json
      - ./shared/src:/app/shared/src
    command: sh -c "DB_USER=aida26_owner DB_PASSWORD=CambiaEsta! npm run migrate && npm run seed-admin && npm run dev"

  # Frontend Service
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: aida26_frontend
    ports:
      - "8080:8080"
    depends_on:
      - backend
    networks:
      - aida26_network
    environment:
      - API_URL=http://backend:3000

volumes:
  postgres_data:

networks:
  aida26_network:
    driver: bridge
