<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión Académica</title>
    <link rel="stylesheet" href="styles/styles.css">
</head>
<body>
    <div class="container">
        <h1 id="app-title">Sistema de Gestión Académica</h1>

        <section id="auth-section" class="auth-section">
            <h2 id="login-title">Ingresar</h2>
            <form id="login-form">
                <div class="form-group">
                    <label id="login-username-label" for="login-username">Usuario</label>
                    <input id="login-username" name="username" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label id="login-password-label" for="login-password">Contraseña</label>
                    <input id="login-password" name="password" type="password" autocomplete="current-password" required>
                </div>
                <p id="login-error" class="message" hidden></p>
                <button id="login-submit-btn" type="submit" class="add-btn">Ingresar</button>
            </form>
        </section>

        <section id="password-section" class="auth-section" style="display: none;">
            <h2 id="password-title">Cambiar contraseña</h2>
            <form id="password-form">
                <div class="form-group">
                    <label id="current-password-label" for="current-password">Contraseña actual</label>
                    <input id="current-password" name="current_password" type="password" required>
                </div>
                <div class="form-group">
                    <label id="new-password-label" for="new-password">Nueva contraseña</label>
                    <input id="new-password" name="new_password" type="password" minlength="8" required>
                </div>
                <p id="password-error" class="message" hidden></p>
                <button id="password-submit-btn" type="submit" class="add-btn">Actualizar</button>
            </form>
        </section>

        <div id="app-shell" style="display: none;">
            <div class="top-bar">
                <span id="current-user"></span>
                <button id="cart-btn" class="cart-btn">Ir al Carrito</button>
                <button id="logout-btn" class="logout-btn">Salir</button>
            </div>

            <nav id='general-nav' class="nav">
                <nav id="table-nav" class="nav">
                </nav>
                <nav id="menu-nav" class='nav'>
                </nav>
            </nav>

            <div id="records-section" class="section active">
                <h2 id="view-title"></h2>
                <p id="status-message" class="message" hidden></p>
                <div class="toolbar">
                    <button id="add-record-btn" class="add-btn"></button>
                    <div id="admin-actions" class="admin-actions" hidden>
                        <button id="add-teacher-btn" class="add-btn">Agregar Profesor</button>
                        <button id="add-admin-btn" class="add-btn">Agregar Admin</button>
                    </div>
                </div>
                <div id="record-form" style="display: none;"></div>
                <table id="records-table">
                    <thead></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
        <section id="cart-section" style="display: none;"></section>
    </div>
</body>
</html>
